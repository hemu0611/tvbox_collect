# ============================================================
# get_iptv 输出增强配置 (首次运行自动生成，可自由修改)
# 规则: KEY = VALUE; 以 # 开头为注释; 布尔值支持 true/false/1/0/yes/no
# 修改后无需改动脚本本体，下次运行自动生效
# ============================================================

# EPG 节目单地址，写入 M3U 头部 x-tvg-url; 留空则不写
EPG_URL = 

# 台标 Logo 基础地址; 最终地址 = LOGO_BASE + 净化频道名 + .png; 留空则不写 tvg-logo
LOGO_BASE = 

# 是否写入 EPG (x-tvg-url)
ENABLE_EPG = false

# 是否写入台标 (tvg-logo)
ENABLE_LOGO = false

# 是否用"净化名"替换可见频道名 (false 则保留模板/源中的原始名称)
SANITIZE_DISPLAY = true

# 是否额外生成"模板外可自动归类"的补充播放列表 (lib/iptv_extra.*)
ENABLE_AUTOGROUP_EXTRA = true
